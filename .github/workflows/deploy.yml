name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    # Review filter config (`paths`, `tags`, etc.) at https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpaths

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun run build

      # Popular action to deploy to GitHub Pages:
      # Docs: https://github.com/peaceiris/actions-gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Build output to publish
          publish_dir: ./build
          # The following lines are NOT needed for setting up a custom domain or CNAME.
          # peaceiris/actions-gh-pages automatically handles CNAME if it's in the publish_dir.
          # Since CNAME is in static/, it will be in build/ after bun run build.
          cname: tutoriais.gigio.dev
